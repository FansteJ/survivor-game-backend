spring.application.name=survivor-game-backend

# Povezivanje sa PostgreSQL (Render varijable, sa lokalnim fallback-om)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/survivor}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# JWT secret key (Render varijabla, sa lokalnim fallback-om)
jwt.secret=${JWT_SECRET:my-super-secret-key-my-super-secret-key-my-super-secret-key}
jwt.expiration=3600000